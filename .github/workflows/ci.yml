name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  node20:
    name: Node 20 compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
      - run: sudo apt-get update && sudo apt-get install -y sqlite3
      - run: pnpm install --frozen-lockfile
      - run: pnpm release:check
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: sudo apt-get update && sudo apt-get install -y sqlite3
      - run: pnpm install --frozen-lockfile
      - run: pnpm release:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - name: Verify generated runtime is committed
        run: git diff --exit-code
